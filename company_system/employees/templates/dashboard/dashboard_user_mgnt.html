    <script>
  //    function toggleMenu(id) {
  //      document.getElementById(id).classList.toggle("hidden");
  //    }

// ==========================
// Fetch & Render Table
// ==========================
function fetchData(page = 1, search = "") {
  fetch(`{% url 'ajax_user_list' %}?page=${page}&search=${encodeURIComponent(search)}`)
    .then((res) => res.json())
    .then((data) => {
      tableBody.innerHTML = data.html;
      currentPage = data.current_page;
      attachRoleDropdownListeners(); // reattach listeners after AJAX load
      attachDeleteButtonListeners(); // reattach delete modals if needed
    })
    .catch((err) => console.error("Fetch Error:", err));
}


    </script>
  </body>
