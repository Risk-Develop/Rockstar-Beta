<!-- Overlay -->
<div
  id="overlay"
  class="fixed inset-0 bg-black bg-opacity-50 hidden md:hidden transition-opacity duration-300 z-20"
></div>





<!-- JavaScript -->
<script>
  const sidebar = document.getElementById("sidebar");
  const sidebarOpenBtn = document.getElementById("sidebarOpen");
  const sidebarCloseBtn = document.getElementById("sidebarClose");
  const overlay = document.getElementById("overlay");
  const submenus = document.querySelectorAll("[data-collapse]");
  const themeToggle = document.getElementById("themeToggle");
  const themeIcon = document.getElementById("themeIcon");

  // Sidebar open
  sidebarOpenBtn.addEventListener("click", () => {
    sidebar.classList.remove("-translate-x-full");
    overlay.classList.remove("hidden");
    setTimeout(() => overlay.classList.add("opacity-100"), 10);
    sidebarOpenBtn.classList.add("opacity-0", "pointer-events-none");
  });

  // Sidebar close
  function closeSidebar() {
    sidebar.classList.add("-translate-x-full");
    overlay.classList.remove("opacity-100");
    setTimeout(() => overlay.classList.add("hidden"), 300);
    sidebarOpenBtn.classList.remove("opacity-0", "pointer-events-none");
  }
  sidebarCloseBtn.addEventListener("click", closeSidebar);
  overlay.addEventListener("click", closeSidebar);

  // Collapse toggle
  submenus.forEach((btn) => {
    btn.addEventListener("click", () => {
      const target = document.getElementById(btn.dataset.collapse);
      const arrow = btn.querySelector("span:last-child");
      const isOpen = target.classList.contains("max-h-40");
      target.classList.toggle("max-h-0", isOpen);
      target.classList.toggle("max-h-40", !isOpen);
      arrow.classList.toggle("rotate-90", !isOpen);
    });
  });

  // Smooth fade/slide-in animation on load
  window.addEventListener("DOMContentLoaded", () => {
    const main = document.getElementById("mainContent");
    setTimeout(() => {
      main.classList.remove("opacity-0", "translate-y-4");
      main.classList.add("opacity-100", "translate-y-0");
    }, 100);
  });

  
</script>
