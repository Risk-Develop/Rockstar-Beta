{% extends "base.html" %}
{% load static %}
{% block title %}Finalize Payroll{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-4">Finalize Payroll</h1>

<form method="post" class="max-w-md bg-gray-50 p-4 rounded shadow">
    {% csrf_token %}
    <div class="mb-4">
        <label class="block font-medium">Month</label>
        <input type="number" name="month" min="1" max="12" value="{{ month|default:now.month }}" class="border p-2 w-full rounded">
    </div>
    <div class="mb-4">
        <label class="block font-medium">Year</label>
        <input type="number" name="year" min="2000" max="2100" value="{{ year|default:now.year }}" class="border p-2 w-full rounded">
    </div>
    <div class="mb-4">
        <label class="block font-medium">Cutoff</label>
        <select name="cutoff" class="border p-2 w-full rounded">
            <option value="1">1st Cutoff</option>
            <option value="2">2nd Cutoff</option>
        </select>
    </div>
    <button type="submit" class="bg-green-500 text-white px-4 py-2 rounded">Finalize Payroll</button>
</form>
{% endblock %}
