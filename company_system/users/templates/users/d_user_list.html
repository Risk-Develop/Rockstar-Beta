
  <div class="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
    <h1 class="text-2xl font-bold">User Management</h1>
    <div class="flex flex-col sm:flex-row gap-2">
      <a href="{% url 'dashboard_user_add' %}" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">+ Add User</a>
      <a href="{% url 'role_add' %}" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">+ Add Role</a>
    </div>
  </div>

  <!-- Search & Pagination -->
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-3 gap-3">
    <input 
      id="searchBox" 
      type="text" 
      placeholder="Search by name..." 
      class="border p-2 rounded w-full md:w-1/3 dark:bg-gray-800 dark:text-gray-200"
    />
    <div id="paginationControls" class="flex gap-2">
      <button class="page-btn bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 px-2 py-1 rounded" data-page="1">Prev</button>
      <button class="page-btn bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 px-2 py-1 rounded" data-page="2">Next</button>
    </div>
  </div>

  <!-- Table -->
  <div class="overflow-x-auto">
  <table class="min-w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-sm">
    <thead class="hidden md:table-header-group">
      <tr>
        <th class="px-4 py-2">Name</th>
        <th class="px-4 py-2">Job Title</th>
        <th class="px-4 py-2">Type</th>
        <th class="px-4 py-2">Department</th>
        <th class="px-4 py-2">Role</th>
        <th class="px-4 py-2">Status</th>
        <th class="px-4 py-2">Shift</th>
        <th class="px-4 py-2">Actions</th>
      </tr>
    </thead>
      
      {% include 'partials/d_user_table.html' with staff_list=staff_list roles=roles %}
    </table>
  </div>
</div>


<!-- Modal HTML (hidden by default) -->
<div id="confirmModal" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 hidden">
  <div class="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 p-6 rounded shadow-lg">
    <p class="mb-4">Are you sure you want to update this role?</p>
    <div class="flex justify-end gap-2">
      <button id="confirmYes" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Yes</button>
      <button id="confirmNo" class="px-4 py-2 border rounded hover:bg-gray-200 dark:hover:bg-gray-700">No</button>
    </div>
  </div>
</div>
