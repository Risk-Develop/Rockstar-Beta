<!-- users/templates/users/user_confirm_delete.html -->
<!doctype html>
<html>
<head><meta charset="utf-8"><title>Delete</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="p-6">
  <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
    <h3 class="text-lg font-semibold">Delete</h3>
    <p class="mt-4">Are you sure you want to delete <strong>{{ staff.first_name }} {{ staff.last_name }}</strong> ?</p>
    <form method="post" class="mt-4">
      {% csrf_token %}
      <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded">Yes, delete</button>
      <a href="{% url 'user_list' %}" class="ml-2">Cancel</a>
    </form>
  </div>
</body>
</html>
