<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>{% block title %} Admin Dept {% endblock %}</title>

    {% include 'includes/header.html' %}
  </head>
  <body class="bg-gray-100 p-6">
    <div class="max-w-6xl mx-auto">
      <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">Admin Dept — User Management</h1>
        <a
          href="{% url 'user_add' %}"
          class="bg-blue-600 text-white px-4 py-2 rounded"
          >+ Add User</a
        >
        <a
          href="{% url 'role_add' %}"
          class="bg-blue-600 text-white px-4 py-2 rounded"
          >+ Add Role</a
        >
        <!--<button onclick="openModal('add')" class="bg-blue-600 text-white px-4 py-2 rounded">+ Add User</button>-->
      </div>

      <div class="bg-white shadow rounded">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8 py-4">
          <div class="overflow-x-auto">



          <div class="flex justify-between mb-3">
  <input 
    id="searchBox" 
    type="text" 
    placeholder="Search by name..." 
    class="border p-2 rounded w-1/3"
  />

  <div id="paginationControls">
    <button class="page-btn bg-gray-200 px-2 py-1 rounded" data-page="1">Prev</button>
    <button class="page-btn bg-gray-200 px-2 py-1 rounded" data-page="2">Next</button>
  </div>
  
</div>





            <table
              class="min-w-full bg-white border border-gray-200 rounded-lg shadow-sm"
            >
              <thead class="bg-gray-100 text-gray-700">
                <tr
                  class="block md:table-row border md:border-0 rounded-lg md:rounded-none mb-2 md:mb-0"
                >
                  <th
                    class="block md:table-cell px-4 py-2 before:content-['Name:'] before:block md:before:hidden font-semibold md:font-normal"
                  >
                    Name
                  </th>
                  <th
                    class="block md:table-cell px-4 py-2 before:content-['Job Title:'] before:block md:before:hidden font-semibold md:font-normal"
                  >
                    Job Title
                  </th>
                  <th
                    class="block md:table-cell px-4 py-2 before:content-['Type:'] before:block md:before:hidden font-semibold md:font-normal"
                  >
                    Type
                  </th>
                  <th
                    class="block md:table-cell px-4 py-2 before:content-['Department:'] before:block md:before:hidden font-semibold md:font-normal"
                  >
                    Department
                  </th>
                  <th
                    class="block md:table-cell px-4 py-2 before:content-['Department:'] before:block md:before:hidden font-semibold md:font-normal"
                  >
                    Role
                  </th>
                  <th
                    class="block md:table-cell px-4 py-2 before:content-['Status:'] before:block md:before:hidden font-semibold md:font-normal"
                  >
                    Status
                  </th>
                  <th
                    class="block md:table-cell px-4 py-2 before:content-['Shift:'] before:block md:before:hidden font-semibold md:font-normal"
                  >
                    Shift
                  </th>
                  <th
                    class="block md:table-cell px-4 py-2 before:content-['Actions:'] before:block md:before:hidden font-semibold md:font-normal"
                  >
                    Actions
                  </th>
                </tr>
              </thead>
                
  {% include 'partials/user_table.html' %}
            </table>
          </div>
        </div>
      </div>
    </div>


<!-- Modal HTML (hidden by default) -->
<div id="confirmModal" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 hidden">
  <div class="bg-white p-6 rounded shadow-lg">
    <p class="mb-4">Are you sure you want to update taaaassshis role?</p>
    <div class="flex justify-end gap-2">
      <button id="confirmYes" class="bg-blue-600 text-white px-4 py-2 rounded">Yes</button>
      <button id="confirmNo" class="px-4 py-2 border rounded">No</button>
    </div>
  </div>
</div>


<script>
const searchInput = document.getElementById("searchBox");
const tableBody = document.querySelector("table tbody");
let currentPage = 1;

// Modal elements
const modal = document.getElementById('confirmModal');
const yesBtn = document.getElementById('confirmYes');
const noBtn = document.getElementById('confirmNo');
let currentForm = null;
let originalValue = null;

// ----------------------
// Attach role dropdown listeners
function attachRoleDropdownListeners() {
  document.querySelectorAll('.inline-role-form select[name="role"]').forEach(select => {
    // Store original value on focus
    select.addEventListener('focus', () => {
      originalValue = select.value;
    });

    // When user changes dropdown, open modal
    select.addEventListener('change', function() {
      currentForm = this.closest('form');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    });
  });
}

// ----------------------
// AJAX fetch for table
function fetchData(page=1, search="") {
  fetch(`{% url 'ajax_user_list' %}?page=${page}&search=${encodeURIComponent(search)}`)
    .then(res => res.json())
    .then(data => {
      tableBody.innerHTML = data.html;
      currentPage = data.current_page;
      attachRoleDropdownListeners(); // reattach after reload
    });
}

// ----------------------
// Search input
searchInput.addEventListener("input", function() {
  const query = this.value.trim();
  fetchData(1, query);
});

// ----------------------
// Pagination buttons
document.addEventListener("click", function(e) {
  if (e.target.classList.contains("page-btn")) {
    const page = e.target.dataset.page;
    fetchData(page, searchInput.value.trim());
  }
});

// ----------------------
// Modal actions
yesBtn.addEventListener('click', () => {
  if (currentForm) currentForm.submit();
  closeModal();
});

noBtn.addEventListener('click', () => {
  if (currentForm && originalValue !== null) {
    const select = currentForm.querySelector('select[name="role"]');
    select.value = originalValue;
  }
  closeModal();
});

// ----------------------
// Helper to close modal and reset state
function closeModal() {
  modal.classList.add('hidden');
  modal.classList.remove('flex');
  currentForm = null;
  originalValue = null;
}

// ----------------------
// Initial attach on page load
attachRoleDropdownListeners();
fetchData(currentPage);
</script>


    {% include 'includes/script.html' %}
  </body>
</html>
