<!-- users/templates/users/user_form.html -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ action }} User</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-2xl mx-auto bg-white p-6 rounded shadow">
    <h2 class="text-xl font-bold mb-4">{{ action }} User</h2>

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="grid grid-cols-1 gap-4">

        {% for field in form %}
          <div>
            <label class="block font-medium">{{ field.label_tag }}</label>
            {{ field }}
            {% if field.errors %}
              <p class="text-red-600 text-sm mt-1">
                {{ field.errors|striptags }}
              </p>
            {% endif %}
          </div>
        {% endfor %}

      </div>

      <div class="mt-4 flex gap-2">
        <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
          {{ action }}
        </button>
        <a href="{% url 'user_list' %}" class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">Cancel</a>
      </div>
    </form>
  </div>
</body>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // -----------------------------
    // AUTO-COMPUTE TENURE (Years, Months, Days)
    // -----------------------------
    const startDateInput = document.getElementById("id_start_date");
    const tenureInput = document.getElementById("id_tenure_active");

    function calculateFullTenure() {
        const startValue = startDateInput.value;
        if (!startValue) return;

        const start = new Date(startValue);
        const today = new Date();

        let years = today.getFullYear() - start.getFullYear();
        let months = today.getMonth() - start.getMonth();
        let days = today.getDate() - start.getDate();

        // Fix negative days
        if (days < 0) {
            months -= 1;
            const prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
            days += prevMonth.getDate();
        }

        // Fix negative months
        if (months < 0) {
            years -= 1;
            months += 12;
        }

        let result = "";

        if (years > 0) {
            result += years + (years === 1 ? " year, " : " years, ");
        } else {
            result += "0 years, ";
        }

        if (months > 0) {
            result += months + (months === 1 ? " month, " : " months, ");
        } else {
            result += "0 months, ";
        }

        result += days + (days === 1 ? " day" : " days");

        tenureInput.value = result;
    }

    startDateInput.addEventListener("change", calculateFullTenure);



    // -----------------------------
    // AUTO-COMPUTE AGE (Years)
    // -----------------------------
    const birthInput = document.getElementById("id_birthdate");
    const ageInput = document.getElementById("id_age");

    function calculateAge() {
        const birthValue = birthInput.value;
        if (!birthValue) return;

        const birth = new Date(birthValue);
        const today = new Date();

        let age = today.getFullYear() - birth.getFullYear();
        const m = today.getMonth() - birth.getMonth();

        if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) {
            age--;
        }

        ageInput.value = age >= 0 ? age : 0;
    }

    birthInput.addEventListener("change", calculateAge);



    // -----------------------------
    // AUTO-GENERATE EMPLOYEE NUMBER
    // Format: EMP-yyyyMM-xxxx
    // -----------------------------
    const empInput = document.getElementById("id_employee_number");

    function generateEmployeeNumber() {
        if (empInput.value) return; // Do not override if already exists

        const now = new Date();

        const year = now.getFullYear().toString();
        const month = ("0" + (now.getMonth() + 1)).slice(-2);

        const randomId = Math.floor(1000 + Math.random() * 9000); // 4-digit number

        const empNo = `EMP-${year}${month}-${randomId}`;
        empInput.value = empNo;
    }

    // Generate on page load
   // generateEmployeeNumber();
});
</script>


</html>
