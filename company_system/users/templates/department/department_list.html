<div class="max-w-4xl mx-auto p-4">
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-2xl font-bold">Department</h1>
    <a
      href="{% url 'department_add' %}"
      class="bg-blue-600 text-white px-4 py-2 rounded"
      >+ Add Department</a
    >
  </div>

  <table class="min-w-full bg-white border rounded shadow">
    <thead class="bg-gray-100">
      <tr>
        <th class="px-4 py-2 text-left">Department Name</th>
        <th class="px-4 py-2 text-left">Description</th>
        <th class="px-4 py-2 text-left">Active</th>
        <th class="px-4 py-2 text-left">Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for department in departments %}
      <tr class="border-t">
        <td class="px-4 py-2">{{ department.department_name }}</td>
        <td class="px-4 py-2">{{ department.description }}</td>
        <td class="px-4 py-2">{{ department.is_active|yesno:"Yes,No" }}</td>
        <td class="px-4 py-2">
          <a href="{% url 'department_edit' department.pk %}" class="text-indigo-600 mr-2"
            >Edit</a
          >
          <a href="{% url 'department_delete' department.pk %}" class="text-red-600"
            >Delete</a
          >
        </td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="4" class="px-4 py-6 text-center text-gray-400">
          No Departments yet
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
