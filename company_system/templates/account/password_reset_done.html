{% extends "base.html" %}
{% load static %}
{% load allauth %}
{% block title %}Password Reset Sent{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
    <div class="max-w-md w-full bg-white p-8 rounded-lg shadow-md text-center">
        <div class="flex justify-center mb-6">
            <img src="{% static 'img/Rockstar.png' %}" alt="Logo" class="h-16 w-16">
        </div>

        <h2 class="text-2xl font-bold text-center mb-6">Check Your Email</h2>
        
        <div class="mb-6">
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-4">
                <svg class="h-6 w-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
            </div>
            <p class="text-gray-600">
                We've emailed you instructions for setting your password. You should receive them shortly.
            </p>
        </div>
        
        <p class="mt-4 text-sm">
            <a href="{% url 'account_login' %}" class="text-orange-500 hover:underline">Back to Login</a>
        </p>
    </div>
</div>
{% endblock %}
