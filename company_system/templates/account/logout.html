{% extends "base.html" %}
{% load static %}
{% load allauth %}
{% block title %} Logout {% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
    <div class="max-w-md w-full bg-white p-8 rounded-lg shadow-md text-center">
        <h2 class="text-2xl font-bold mb-4">Sign Out</h2>
        <p class="text-gray-600 mb-6">Are you sure you want to sign out?</p>
        
        <form method="post" action="{{ url }}">
            {% csrf_token %}
            {% if redirect_field_value %}
                <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
            {% endif %}
            <button type="submit" class="w-full bg-orange-500 text-white py-2 rounded hover:bg-orange-600 transition">
                Sign Out
            </button>
        </form>
        
        <p class="mt-4 text-sm">
            <a href="{% url 'account_login' %}" class="text-orange-500 hover:underline">Cancel</a>
        </p>
    </div>
</div>
{% endblock %}
