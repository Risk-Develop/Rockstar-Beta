<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Company System{% endblock %}</title>

{% include 'includes/header.html' %}
</head>

<body
    class="m-0 p-0 bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-300"
  >

  

  

    {% block content %}
   

    {% endblock %}



{% include 'includes/footer.html' %}
{% include 'includes/script.html' %}
  <script>
   // function toggleMenu(id) {
   //   document.getElementById(id).classList.toggle("hidden");
   // }

   // ✅ Persistent Dark Mode
  const storedTheme = localStorage.getItem("theme");

  if (
    storedTheme === "dark" ||
    (!storedTheme && window.matchMedia("(prefers-color-scheme: dark)").matches)
  ) {
    document.documentElement.classList.add("dark");
    themeIcon.textContent = "🌞"; // Light mode icon
  } else {
    document.documentElement.classList.remove("dark");
    themeIcon.textContent = "🌙"; // Dark mode icon
  }

  themeToggle.addEventListener("click", () => {
    const isDark = document.documentElement.classList.toggle("dark");
    themeIcon.textContent = isDark ? "🌞" : "🌙";
    localStorage.setItem("theme", isDark ? "dark" : "light");
  });

  // ✅ Tailwind class-based dark mode
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {},
    },
  };
  </script>
  {% block extra_scripts %}
  {% endblock %}
  </body>
</html>
