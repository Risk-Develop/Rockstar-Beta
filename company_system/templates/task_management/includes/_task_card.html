{% load task_management_tags %}
<div class="task-card bg-white rounded-lg shadow-sm p-3 mb-2 border-l-4 {% if task.priority == 'urgent' %}priority-urgent{% elif task.priority == 'high' %}priority-high{% elif task.priority == 'medium' %}priority-medium{% else %}priority-low{% endif %}"
     data-task-id="{{ task.id }}"
     draggable="true">
    <div class="flex justify-between items-start">
        <h4 class="font-medium text-gray-800 text-sm">{{ task.title }}</h4>
        <button onclick="openTaskDetail('{{ task.id }}')" class="text-gray-400 hover:text-gray-600">
            <i class="fas fa-ellipsis-h"></i>
        </button>
    </div>
    {% if task.description %}
    <p class="text-xs text-gray-500 mt-1 line-clamp-2">{{ task.description }}</p>
    {% endif %}
    <div class="flex justify-between items-center mt-2 pt-2 border-t border-gray-100">
        <div class="flex items-center gap-1">
            {% if task.assigned_to %}
            <img src="https://ui-avatars.com/api/?name={{ task.assigned_to.first_name }}+{{ task.assigned_to.last_name }}&size=20&bg=random" 
                 class="w-5 h-5 rounded-full" title="{{ task.assigned_to.first_name }} {{ task.assigned_to.last_name }}">
            {% endif %}
        </div>
        <div class="flex items-center gap-2 text-xs text-gray-500">
            {% if task.deadline %}
            <span class="{% if task.deadline|is_past %}text-red-500{% endif %}">
                <i class="fas fa-calendar mr-1"></i>{{ task.deadline|date:"M d" }}
            </span>
            {% endif %}
        </div>
    </div>
</div>

<script>
function openTaskDetail(taskId) {
    window.location.href = '/task/tasks/' + taskId + '/';
}
</script>
