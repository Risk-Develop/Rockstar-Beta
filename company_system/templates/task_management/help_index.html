{% extends 'task_management/base.html' %}

{% block title %}User Guide{% endblock %}
{% block page_title %}User Guide{% endblock %}

{% block extra_css %}
<style>
    .markdown-content h1 { 
        font-size: 2rem; font-weight: 700; margin-bottom: 1rem; color: #1f2937; 
        padding-bottom: 0.5rem; border-bottom: 2px solid #e5e7eb; 
    }
    .markdown-content h2 { 
        font-size: 1.5rem; font-weight: 600; margin-top: 2rem; margin-bottom: 0.75rem; color: #374151; 
    }
    .markdown-content h3 { 
        font-size: 1.25rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #4b5563; 
    }
    .markdown-content p { 
        margin-bottom: 1rem; line-height: 1.7; color: #4b5563; 
    }
    .markdown-content ul, .markdown-content ol { 
        margin-bottom: 1rem; padding-left: 1.5rem; 
    }
    .markdown-content ul { list-style-type: disc; }
    .markdown-content ol { list-style-type: decimal; }
    .markdown-content li { 
        margin-bottom: 0.5rem; line-height: 1.6; color: #4b5563; 
    }
    .markdown-content strong { 
        font-weight: 600; color: #1f2937; 
    }
    .markdown-content em { 
        font-style: italic; color: #6b7280; 
    }
    .markdown-content code {
        background-color: #f3f4f6; padding: 0.125rem 0.375rem; border-radius: 0.25rem;
        font-size: 0.875em; color: #e11d48; font-family: monospace;
    }
    .markdown-content pre {
        background-color: #1f2937; color: #f9fafb; padding: 1rem; border-radius: 0.5rem;
        overflow-x: auto; margin-bottom: 1rem;
    }
    .markdown-content pre code {
        background: none; padding: 0; color: inherit; font-size: 0.875rem;
    }
    .markdown-content hr {
        border: 0; height: 1px; background: #e5e7eb; margin: 2rem 0;
    }
    .markdown-content table {
        width: 100%; border-collapse: collapse; margin-bottom: 1rem;
    }
    .markdown-content th, .markdown-content td {
        border: 1px solid #e5e7eb; padding: 0.5rem; text-align: left;
    }
    .markdown-content th {
        background-color: #f9fafb; font-weight: 600;
    }
    .dark .markdown-content h1 { color: #f9fafb; border-bottom-color: #374151; }
    .dark .markdown-content h2 { color: #f3f4f6; }
    .dark .markdown-content h3 { color: #e5e7eb; }
    .dark .markdown-content p, .dark .markdown-content li { color: #d1d5db; }
    .dark .markdown-content strong { color: #f9fafb; }
    .dark .markdown-content em { color: #9ca3af; }
    .dark .markdown-content code { background-color: #374151; color: #fda4af; }
    .dark .markdown-content pre { background-color: #111827; }
    .dark .markdown-content hr { background: #374151; }
    .dark .markdown-content th, .dark .markdown-content td { border-color: #374151; }
    .dark .markdown-content th { background-color: #1f2937; }
</style>
{% endblock %}

{% block main_content %}
<div class="p-6">
    <div class="max-w-4xl mx-auto">
        <!-- Header with back button -->
        <div class="mb-6 flex items-center gap-4">
            <a href="{% url 'task_management:personal_board_list' %}" 
               class="inline-flex items-center gap-2 px-4 py-2 bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 dark:hover:bg-gray-700 rounded-lg transition"
               title="Back to Personal Boards">
                <i class="fas fa-arrow-left"></i>
                <span>Back</span>
            </a>
            <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100">User Guide</h1>
        </div>

        <!-- Documentation content -->
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 md:p-8">
            <div class="markdown-content">
                {{ guide_content|safe }}
            </div>
        </div>
    </div>
</div>
{% endblock %}
