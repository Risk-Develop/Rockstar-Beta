{% load static %}
<header class="flex items-center justify-between p-4 bg-gray-800 text-white md:ml-64 transition-all duration-300 shadow">
  <!-- Left section: Sidebar toggle + Logo + Title -->
  <div class="flex items-center gap-4">
    <!-- Sidebar toggle (mobile only) -->
    <button id="sidebarOpen" class="md:hidden bg-gray-700 px-3 py-2 rounded">
      ☰
    </button>

    <!-- Logo 
    <img src="" alt="Rockstar Logo" class="h-10 w-10">-->

    <!-- Title -->
    <!--<h1 class="text-xl font-bold">Master Dashboard</h1>-->
  </div>

  <!-- Right section: Theme toggle + Logout -->
  <div class="flex items-center gap-4">
    <!-- Theme toggle button -->
    <button
      id="themeToggle"
      class="p-2 rounded-full bg-gray-200 dark:bg-gray-700 hover:scale-110 transition-all duration-300"
      title="Toggle Dark/Light Mode"
    >
      <span id="themeIcon">🌙</span>
    </button>

    <!-- Logout -->
    <!--<a href="{% url 'logout' %}" class="text-red-500 font-semibold hover:underline">Logout</a>-->
  </div>
</header>
