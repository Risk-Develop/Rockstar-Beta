{% extends "base.html" %}



{% block content %}
<main
  id="mainContent"
  class="md:ml-64 pt-20 min-h-screen p-6 transition-all duration-500 ease-in-out transform bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100"
>

<div class="max-w-md mx-auto bg-white border rounded-xl shadow p-6 space-y-6">

  <h1 class="text-2xl font-semibold text-red-600">Delete Staff</h1>
  <p>Are you sure you want to delete <span class="font-semibold">{{ staff.first_name }} {{ staff.last_name }}</span>?</p>

  <div class="flex justify-end gap-4 mt-4">

    <form method="POST" action="{% url 'human_resource:user_delete_dash' staff.pk %}">
      {% csrf_token %}
      <button type="submit" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded shadow">
        Yes, Delete
      </button>
    </form>

    <a href="{% url 'human_resource:hr_user_mgnt' %}" 
       class="px-4 py-2 border rounded hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
      Cancel
    </a>

  </div>

</div>
</main>

{% endblock %}
