<!-- Response Breakdown Card -->
<div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-5 hover:shadow-md transition-shadow">
    <div class="flex items-center justify-between mb-3">
        <p class="text-sm font-medium text-gray-500 dark:text-gray-400">Response Breakdown</p>
    </div>
    <div class="space-y-2">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-green-500"></span>
                <span class="text-sm text-gray-600 dark:text-gray-400">Promoters (9-10)</span>
            </div>
            <span class="text-sm font-semibold text-green-600">{{ promoter_count|default:0 }}</span>
        </div>
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-yellow-500"></span>
                <span class="text-sm text-gray-600 dark:text-gray-400">Passives (7-8)</span>
            </div>
            <span class="text-sm font-semibold text-yellow-600">{{ passive_count|default:0 }}</span>
        </div>
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-red-500"></span>
                <span class="text-sm text-gray-600 dark:text-gray-400">Detractors (0-6)</span>
            </div>
            <span class="text-sm font-semibold text-red-600">{{ detractor_count|default:0 }}</span>
        </div>
    </div>
</div>
