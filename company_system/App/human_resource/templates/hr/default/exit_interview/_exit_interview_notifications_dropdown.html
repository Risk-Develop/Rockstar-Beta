{% load hr_extras %}
{% if notifications %}
  <div class="p-2 space-y-1">
    {% for n in notifications %}
    <a href="{{ n.url }}"
       class="flex items-start gap-3 p-2.5 rounded-lg hover:bg-blue-50 dark:hover:bg-gray-700 transition-colors group">
      <div class="w-2 h-2 mt-2 rounded-full bg-red-500 flex-shrink-0"></div>
      <div class="min-w-0 flex-1">
        <p class="text-sm font-medium text-gray-800 dark:text-gray-200 truncate group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">
          {{ n.employee }}
        </p>
        <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">{{ n.type }}</p>
        <p class="text-xs text-gray-400 dark:text-gray-500 mt-0.5">{{ n.created_at }}</p>
      </div>
    </a>
    {% endfor %}
  </div>
  <div class="p-2 border-t border-gray-200 dark:border-gray-700">
    <a href="{% url 'human_resource:exit_interview_list' %}"
       class="block text-center text-xs text-blue-600 dark:text-blue-400 hover:underline py-1">
      View all exit interviews
    </a>
  </div>
{% else %}
  <div class="p-6 text-center">
    <svg class="w-10 h-10 mx-auto text-gray-300 dark:text-gray-600 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
    </svg>
    <p class="text-sm text-gray-500 dark:text-gray-400">No notifications</p>
    <p class="text-xs text-gray-400 dark:text-gray-500 mt-1">All caught up!</p>
  </div>
{% endif %}
