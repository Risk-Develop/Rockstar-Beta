{% extends "base.html" %}
{% load static %}
{% block title %}{% if bank_type %}Edit{% else %}Add{% endif %} Bank Type{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold mb-6">{% if bank_type %}Edit{% else %}Add{% endif %} Bank Type</h1>
    
    <div class="bg-white shadow rounded-lg p-6 max-w-lg">
        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Bank Name</label>
                <input type="text" name="name" required 
                       value="{{ bank_type.name|default:'' }}"
                       class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="e.g., BDO, BPI, Metrobank">
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Bank Code (Optional)</label>
                <input type="text" name="code" 
                       value="{{ bank_type.code|default:'' }}"
                       class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="e.g., BDO001">
            </div>
            
            <div class="flex justify-end space-x-4">
                <a href="{% url 'human_resource:banktype_list' %}" 
                   class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">
                    Cancel
                </a>
                <button type="submit" 
                        class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
                    {% if bank_type %}Save Changes{% else %}Add Bank Type{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
