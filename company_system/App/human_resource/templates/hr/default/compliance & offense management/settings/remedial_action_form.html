{% extends "base.html" %}
{% load static %}

{% block title %}{{ action }} Remedial Action{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-6">
    <nav class="flex items-center gap-2 text-sm text-gray-500 mb-4">
        <a href="{% url 'human_resource:remedial_action_list' %}">Remedial Actions</a>
        <span>/</span>
        <span>{{ action }}</span>
    </nav>
    <h1 class="text-2xl font-bold mb-6">{{ action }} Remedial Action</h1>
    <div class="bg-white rounded-lg shadow p-6 max-w-xl">
        <form method="post">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Range *</label>
                    <select name="range_code" required class="w-full border rounded-lg px-4 py-2">
                        <option value="A" {% if action_obj.range_code == 'A' %}selected{% endif %}>Range A</option>
                        <option value="B" {% if action_obj.range_code == 'B' %}selected{% endif %}>Range B</option>
                        <option value="C" {% if action_obj.range_code == 'C' %}selected{% endif %}>Range C</option>
                        <option value="D" {% if action_obj.range_code == 'D' %}selected{% endif %}>Range D</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Offense Count *</label>
                    <input type="number" name="offense_count" value="{{ action_obj.offense_count|default:1 }}" min="1" max="5" required class="w-full border rounded-lg px-4 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Action *</label>
                    <input type="text" name="action" value="{{ action_obj.action|default:'' }}" required class="w-full border rounded-lg px-4 py-2" placeholder="e.g., Verbal Warning">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Action Details</label>
                    <textarea name="action_details" rows="3" class="w-full border rounded-lg px-4 py-2">{{ action_obj.action_details|default:'' }}</textarea>
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" name="is_active" id="is_active" {% if action_obj.is_active|default:true %}checked{% endif %}>
                    <label for="is_active">Active</label>
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <a href="{% url 'human_resource:remedial_action_list' %}" class="px-4 py-2 bg-gray-200 rounded-lg">Cancel</a>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg">{{ action }}</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
