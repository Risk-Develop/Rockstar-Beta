{% extends "base.html" %}
{% load static %}

{% block title %}{{ action }} Offense Classification{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-6">
    <nav class="flex items-center gap-2 text-sm text-gray-500 dark:text-gray-400 mb-4">
        <a href="{% url 'human_resource:hr_dashboard' %}">Dashboard</a>
        <span>/</span>
        <a href="{% url 'human_resource:classification_list' %}">Classifications</a>
        <span>/</span>
        <span class="text-gray-900 dark:text-gray-100">{{ action }}</span>
    </nav>

    <h1 class="text-2xl font-bold mb-6">{{ action }} Offense Classification</h1>

    <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 max-w-2xl">
        <form method="post">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Offense Section</label>
                    <select name="offense_section" required class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 bg-white dark:bg-gray-700">
                        <option value="">Select Section</option>
                        {% for s in sections %}
                        <option value="{{ s.pk }}" {% if classification.offense_section_id == s.pk %}selected{% endif %}>{{ s.offense_group.group_number }} - {{ s.section_number }}: {{ s.section_title }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Offense Description</label>
                    <textarea name="offense_description" rows="4" required class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 bg-white dark:bg-gray-700">{{ classification.offense_description|default:'' }}</textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Default Range</label>
                    <select name="default_range" required class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 bg-white dark:bg-gray-700">
                        <option value="A" {% if classification.default_range == 'A' %}selected{% endif %}>Range A</option>
                        <option value="B" {% if classification.default_range == 'B' %}selected{% endif %}>Range B</option>
                        <option value="C" {% if classification.default_range == 'C' %}selected{% endif %}>Range C</option>
                        <option value="D" {% if classification.default_range == 'D' %}selected{% endif %}>Range D</option>
                    </select>
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" name="is_active" id="is_active" {% if classification.is_active|default:true %}checked{% endif %}>
                    <label for="is_active" class="text-sm text-gray-700 dark:text-gray-300">Active</label>
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <a href="{% url 'human_resource:classification_list' %}" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg">Cancel</a>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">{{ action }}</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
