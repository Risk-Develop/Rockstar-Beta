{% extends "base.html" %}
{% load static %}

{% block title %}{{ action }} Offense Section{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-6">
    <nav class="flex items-center gap-2 text-sm text-gray-500 dark:text-gray-400 mb-4">
        <a href="{% url 'human_resource:hr_dashboard' %}">Dashboard</a>
        <span>/</span>
        <a href="{% url 'human_resource:offense_section_list' %}">Offense Sections</a>
        <span>/</span>
        <span class="text-gray-900 dark:text-gray-100">{{ action }}</span>
    </nav>

    <h1 class="text-2xl font-bold mb-6">{{ action }} Offense Section</h1>

    <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 max-w-2xl">
        <form method="post">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Offense Group</label>
                    <select name="offense_group" required class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100">
                        <option value="">Select Group</option>
                        {% for g in groups %}
                        <option value="{{ g.pk }}" {% if section.offense_group_id == g.pk %}selected{% endif %}>{{ g.group_number }}: {{ g.group_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Section Number</label>
                    <input type="text" name="section_number" value="{{ section.section_number|default:'' }}" required class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 bg-white dark:bg-gray-700">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Section Title</label>
                    <input type="text" name="section_title" value="{{ section.section_title|default:'' }}" required class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 bg-white dark:bg-gray-700">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description</label>
                    <textarea name="description" rows="3" class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 bg-white dark:bg-gray-700">{{ section.description|default:'' }}</textarea>
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" name="is_active" id="is_active" {% if section.is_active|default:true %}checked{% endif %}>
                    <label for="is_active" class="text-sm text-gray-700 dark:text-gray-300">Active</label>
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <a href="{% url 'human_resource:offense_section_list' %}" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg">Cancel</a>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">{{ action }}</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
