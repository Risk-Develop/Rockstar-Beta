<div class="max-w-md mx-auto p-4 bg-white rounded shadow">
  <h2 class="text-lg font-semibold mb-4">
    {% if staff.role %} Change Role for {{ staff.first_name }} {% else %} Assign Role to {{ staff.first_name }} {% endif %}
  </h2>

  <form method="post">
    {% csrf_token %}
    <label class="block mb-2 font-medium">Select Role</label>
    <select name="role" class="border rounded p-2 w-full mb-4">
      {% for role in roles %}
        <option value="{{ role.id }}" {% if staff.role_id == role.id %}selected{% endif %}>
          {{ role.name }}
        </option>
      {% endfor %}
    </select>

    <div class="flex gap-2">
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Save</button>
      <a href="{% url 'user_list' %}" class="px-4 py-2 border rounded">Cancel</a>
    </div>
  </form>
</div>
