<form method="POST" class="p-4 bg-white rounded-lg shadow">
  {% csrf_token %}
  <h2 class="text-lg font-semibold mb-2">Assign Role to {{ user.first_name }}</h2>

  <select name="role" class="border rounded p-2 w-full mb-4">
    {% for role in roles %}
      <option value="{{ role.id }}" {% if user.role_id == role.id %}selected{% endif %}>
        {{ role.name }}
      </option>
    {% endfor %}
  </select>

  <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">
    Save
  </button>
</form>
